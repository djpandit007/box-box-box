services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: boxboxbox
      POSTGRES_USER: boxboxbox
      POSTGRES_PASSWORD: boxboxbox
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

volumes:
  pgdata:
