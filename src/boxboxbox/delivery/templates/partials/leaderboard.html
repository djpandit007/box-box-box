<table id="leaderboard" class="leaderboard">
  <thead>
    <tr>
      <th>Pos</th>
      <th>Driver</th>
      <th>Team</th>
      <th>{% if session_type == 'Race' %}Interval{% else %}Best Lap{% endif %}</th>
      <th>{% if session_type == 'Race' %}Trend{% else %}Gap{% endif %}</th>
    </tr>
  </thead>
  <tbody id="leaderboard-body">
    <!-- Rows populated by Pyodide on first snapshot -->
  </tbody>
</table>
